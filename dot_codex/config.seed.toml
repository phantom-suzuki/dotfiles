# Codex CLI ポータブル設定 seed（chezmoi 管理）
#
# このファイルは ~/.codex/config.toml の「ポータブルな部分だけ」を切り出した seed です。
# config.toml 本体は Codex.app が以下を自動生成・自動蓄積するため chezmoi 管理外にしています:
#   - [projects.*]      … 各リポの絶対パス + trust_level（マシン固有・自動蓄積）
#   - notify / [mcp_servers.node_repl] … /Applications/Codex.app のパス・SHA256・appバージョン
#   - [marketplaces.*] / [plugins.*] / [notice] … timestamp・ローカルキャッシュ（常時 churn）
#
# 新マシンセットアップ手順:
#   1. Codex.app を起動して config.toml を自動生成させる
#   2. 下記の値を ~/.codex/config.toml の該当キーに反映する（先頭 model 2 行 + [features]）
#
# Effort 運用方針の正本は ~/.claude/rules/codex-config.md を参照。

# 既定モデルと reasoning effort。委譲パス（task-delegation T2 / /codex:rescue）はこの
# default を尊重するため、Codex のレート消費はまずこの値で調整する（普段は medium で節約）。
# 既定は GPT-5.6 系のバランス型 terra（サブスク認証で動作確認済み・消費は sol の半分）。
# 重い調査・実装だけ都度 --model gpt-5.6-sol に切り替える運用（正本は codex-config.md）。
model = "gpt-5.6-terra"
model_reasoning_effort = "medium"

[features]
js_repl = false

# --- 拡張機構（skills / hooks / MCP）の dotfiles 化方針 ---
#
# Codex は Claude Code の拡張機構に 1:1 対応する仕組みを持つ（Issue #14 の調査、
# 2026-07 に公式ドキュメントで再検証済み）:
#   - skills … 実体は .agents/skills（repo / $HOME/.agents/skills / /etc/codex/skills /
#              Codex 同梱）に置く。config.toml 側は [[skills.config]]（配列テーブル）で
#              per-skill の enable/disable のみを持つ。SKILL.md frontmatter の description で
#              自動トリガ（implicit invocation）。※ config.toml の [skills] で SKILL.md 本体を
#              管理するわけではない点に注意
#   - hooks  … hooks.json / inline [hooks]。SessionStart / PreToolUse / PermissionRequest /
#              PostToolUse / PreCompact / PostCompact / UserPromptSubmit / SubagentStart /
#              SubagentStop / Stop の 10 イベント。type=command のハンドラのみ実行
#              （prompt / agent ハンドラは parse されるが skip）
#   - mcp    … [mcp_servers]。stdio / streamable HTTP、enabled_tools/disabled_tools の
#              allow/denylist、default_tools_approval_mode（auto / prompt / approve）
#
# dotfiles 化ステータス（Issue #14 で対応）:
#   - hooks … 収録済み。dot_codex/hooks/（block-codex-direct.py / cleanup.sh / notify.py）+
#             dot_codex/hooks.json.tmpl（絶対パスは {{ .chezmoi.homeDir }} で抽象化）。
#   - skills … 未収録（意図的）。実機 $HOME/.agents/skills は Claude 側 skills と大半が重複し、
#              private_dot_claude/skills/ で既に版管理済み。二重管理・churn を避けるため seed に
#              載せない。Codex 固有の独自スキルを作る場合のみ、その時点で dot_agents/skills/ 等へ
#              収録を検討する。
#   - mcp … config.toml 本体は管理外（node_repl は Codex.app が生成する絶対パス・SHA256・app
#           バージョンを含みマシン固有）。ポータブルに移植したいサーバーだけを下記のコメント
#           サンプルとして seed に残す（新マシンで config.toml へ手で反映する）。
#
# 詳細な方針・分担の正本は ~/.claude/rules/codex-config.md を参照。
#
# --- MCP ポータブルサンプル（新マシンで config.toml に手で反映する。値は各自調整） ---
# node_repl は Codex.app 生成のためここには載せない（管理外）。
#
# [mcp_servers.chrome-devtools]
# command = "npx"
# args = ["-y", "chrome-devtools-mcp@latest", "--browserUrl=http://127.0.0.1:9222"]
#
# [mcp_servers.playwright]
# command = "npx"   # 実機は nvm の絶対パスだが、PATH が通っていれば npx で可搬
# args = ["@playwright/mcp@latest", "--user-data-dir=<各自のキャッシュディレクトリ>"]
